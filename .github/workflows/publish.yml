name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - "v*.*.*"          # trigger khi push tag: v0.1.0, v1.0.0, ...
  workflow_dispatch:      # cho phep chay thu cong tu GitHub UI
    inputs:
      pre_release:
        description: "Publish as pre-release?"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-sweeps-vscode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent-sweeps-vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package --no-dependencies

      - name: Get version from package.json
        id: pkg
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-sweeps-${{ steps.pkg.outputs.VERSION }}.vsix
          path: agent-sweeps-vscode/agent-sweeps-${{ steps.pkg.outputs.VERSION }}.vsix

      - name: Publish to VS Code Marketplace
        run: |
          if [ "${{ github.event.inputs.pre_release }}" = "true" ]; then
            npx @vscode/vsce publish --no-dependencies --pre-release --pat "${{ secrets.VSCE_PAT }}"
          else
            npx @vscode/vsce publish --no-dependencies --pat "${{ secrets.VSCE_PAT }}"
          fi

      - name: Package Windows installer (zip setup.bat + setup.ps1)
        run: |
          cd ${{ github.workspace }}
          zip -j AGent-Sweeps-Setup-${{ steps.pkg.outputs.VERSION }}-Windows.zip setup.bat setup.ps1
        working-directory: ${{ github.workspace }}

      - name: Package Linux/macOS installer (zip install.sh)
        run: |
          cd ${{ github.workspace }}
          zip -j AGent-Sweeps-Setup-${{ steps.pkg.outputs.VERSION }}-Linux-macOS.zip install.sh
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "AGent Sweeps v${{ steps.pkg.outputs.VERSION }}"
          body: |
            ## AGent Sweeps v${{ steps.pkg.outputs.VERSION }}

            AI-powered disk cleaner cho developer — dọn npm/pip/cargo/Docker cache ngay trong VS Code.

            ---

            ## ⚡ Cài đặt tự động (1 click)

            ### 🪟 Windows — Double-click Setup
            1. Tải **`AGent-Sweeps-Setup-${{ steps.pkg.outputs.VERSION }}-Windows.zip`** bên dưới
            2. Giải nén → **Double-click `setup.bat`**
            3. Script tự động cài: **VS Code + AGent Sweeps + Ollama + model AI** cùng lúc!

            ### 🐧 Linux / macOS — 1 dòng lệnh
            ```bash
            curl -fsSL https://raw.githubusercontent.com/HoangGiaSeo/AGentSweeps/main/install.sh | bash
            ```

            ### ⚡ VS Code URL (nếu đã có VS Code)
            [→ Click đây để cài ngay trong VS Code](vscode:extension/HoangGiaSeo.agent-sweeps)

            ---

            ## ✨ Tính năng
            - 🧹 Dọn 12 loại cache: npm, pip, cargo, gradle, Docker, Windows temp...
            - 💬 Chat AI: Ollama (miễn phí/offline), OpenAI, Gemini, Anthropic
            - 📊 Tổng quan dung lượng ổ đĩa real-time
            - 📋 Lịch sử dọn dẹp
          files: |
            agent-sweeps-vscode/agent-sweeps-${{ steps.pkg.outputs.VERSION }}.vsix
            AGent-Sweeps-Setup-${{ steps.pkg.outputs.VERSION }}-Windows.zip
            AGent-Sweeps-Setup-${{ steps.pkg.outputs.VERSION }}-Linux-macOS.zip
          token: ${{ secrets.GITHUB_TOKEN }}
